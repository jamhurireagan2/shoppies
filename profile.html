<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Shoppies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --card-bg: #ffffff;
            --navbar-bg: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 20px 30px rgba(0,0,0,0.1);
            --gradient-start: #6366f1;
            --gradient-end: #8b5cf6;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --card-bg: #1e293b;
            --navbar-bg: #0f172a;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        /* Navbar */
        .navbar {
            background: var(--navbar-bg);
            box-shadow: var(--shadow);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo i {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: var(--gradient-start);
        }

        /* Profile Page */
        .profile-page {
            margin-top: 100px;
            margin-bottom: 60px;
        }
        .profile-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow);
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1.5rem;
            border: 4px solid var(--gradient-start);
        }
        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .profile-email {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg-primary);
            border-radius: 16px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gradient-start);
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .avatar-upload {
            margin: 1.5rem 0;
        }
        .avatar-upload input {
            display: none;
        }
        .avatar-upload label {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            display: inline-block;
            font-weight: 500;
            transition: all 0.3s;
        }
        .avatar-upload label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99,102,241,0.3);
        }

        .preset-avatars {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .preset-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }
        .preset-avatar:hover {
            transform: scale(1.15);
            border-color: var(--gradient-start);
        }
        .preset-avatar.active {
            border-color: var(--gradient-start);
        }

        .btn-back {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-back:hover {
            background: var(--bg-primary);
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .footer {
            background: var(--navbar-bg);
            color: var(--text-secondary);
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            border-top: 1px solid var(--border-color);
        }

        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 3000;
            transform: translateX(400px);
            transition: transform 0.3s;
            border-left: 4px solid #10b981;
        }
        .notification.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .profile-card {
                padding: 1.5rem;
            }
            .profile-stats {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 0 1rem;
            }
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-container">
                <div class="logo" onclick="window.location.href='index.html'">
                    <i class="fas fa-shopping-bag"></i>
                    <span>shoppies</span>
                </div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="products.html">Products</a>
                    <a href="cart.html">Cart</a>
                    <a href="orders.html">My Orders</a>
                    <a href="profile.html" style="color: var(--gradient-start);">Profile</a>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <a href="cart.html" style="position: relative; color: var(--text-secondary);">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cartBadge" style="position: absolute; top: -8px; right: -12px; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%;">0</span>
                    </a>
                    <button class="theme-toggle" onclick="toggleTheme()">
                        <i class="fas fa-moon" id="themeIcon"></i>
                        <span id="themeText">Dark</span>
                    </button>
                    <div id="userMenu"></div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container profile-page">
        <div class="profile-card">
            <img id="profileAvatar" class="profile-avatar" src="https://ui-avatars.com/api/?background=6366f1&color=fff&bold=true&name=User" alt="Profile">
            <h2 class="profile-name" id="profileName">User</h2>
            <p class="profile-email" id="profileEmail">user@example.com</p>

            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalOrders">0</div>
                    <div class="stat-label">Total Orders</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="wishlistCount">0</div>
                    <div class="stat-label">Wishlist Items</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">24/7</div>
                    <div class="stat-label">Support</div>
                </div>
            </div>

            <div class="avatar-upload">
                <label for="avatarUpload">📸 Upload Photo</label>
                <input type="file" id="avatarUpload" accept="image/*" onchange="uploadAvatar(event)">
            </div>

            <p style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1rem;">Or choose a preset avatar:</p>
            <div class="preset-avatars">
                <img class="preset-avatar" src="https://ui-avatars.com/api/?background=6366f1&color=fff&bold=true&name=👤" onclick="setPresetAvatar(1)">
                <img class="preset-avatar" src="https://ui-avatars.com/api/?background=ec4899&color=fff&bold=true&name=⭐" onclick="setPresetAvatar(2)">
                <img class="preset-avatar" src="https://ui-avatars.com/api/?background=10b981&color=fff&bold=true&name=🛒" onclick="setPresetAvatar(3)">
                <img class="preset-avatar" src="https://ui-avatars.com/api/?background=f59e0b&color=fff&bold=true&name=🎉" onclick="setPresetAvatar(4)">
                <img class="preset-avatar" src="https://ui-avatars.com/api/?background=ef4444&color=fff&bold=true&name=❤️" onclick="setPresetAvatar(5)">
                <img class="preset-avatar" src="https://ui-avatars.com/api/?background=06b6d4&color=fff&bold=true&name=🚀" onclick="setPresetAvatar(6)">
                <img class="preset-avatar" src="https://ui-avatars.com/api/?background=8b5cf6&color=fff&bold=true&name=🌟" onclick="setPresetAvatar(7)">
                <img class="preset-avatar" src="https://ui-avatars.com/api/?background=22c55e&color=fff&bold=true&name=🌈" onclick="setPresetAvatar(8)">
            </div>

            <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                <button class="btn-back" onclick="window.location.href='products.html'">
                    <i class="fas fa-arrow-left"></i> Back to Shopping
                </button>
                <button class="btn-back" onclick="handleLogout()" style="color: #ef4444; border-color: #ef4444;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Shoppies. All rights reserved. | <i class="fas fa-heart" style="color: #ec4899;"></i> Kenya's #1 Online Store</p>
    </footer>

    <div id="notification" class="notification"></div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.borderLeft = type === 'success' ? '4px solid #10b981' : '4px solid #ef4444';
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function getCurrentUser() {
            const user = localStorage.getItem('user');
            return user ? JSON.parse(user) : null;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            if (isDark) {
                themeIcon.className = 'fas fa-sun';
                themeText.textContent = 'Light';
            } else {
                themeIcon.className = 'fas fa-moon';
                themeText.textContent = 'Dark';
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').className = 'fas fa-sun';
                document.getElementById('themeText').textContent = 'Light';
            }
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = count;
        }

        function updateWishlistCount() {
            const wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
            document.getElementById('wishlistCount').textContent = wishlist.length;
        }

        function updateUserMenu() {
            const user = getCurrentUser();
            const userMenu = document.getElementById('userMenu');
            if (userMenu) {
                if (user) {
                    const savedAvatar = localStorage.getItem(`avatar_${user.id}`);
                    const avatarHtml = savedAvatar ? 
                        `<img src="${savedAvatar}" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover; margin-right: 0.25rem;">` : 
                        `<i class="fas fa-user-circle"></i>`;
                    userMenu.innerHTML = `
                        <div style="position: relative; display: inline-block;">
                            <button style="background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; border: none; padding: 0.5rem 1rem; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                                ${avatarHtml} ${user.name.split(' ')[0]} <i class="fas fa-chevron-down"></i>
                            </button>
                        </div>
                    `;
                } else {
                    userMenu.innerHTML = `<button onclick="window.location.href='index.html'" style="background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; border: none; padding: 0.5rem 1rem; border-radius: 50px; cursor: pointer;">Sign In</button>`;
                }
            }
        }

        function uploadAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const avatarUrl = e.target.result;
                    document.getElementById('profileAvatar').src = avatarUrl;
                    const user = getCurrentUser();
                    if (user) {
                        localStorage.setItem(`avatar_${user.id}`, avatarUrl);
                        showNotification('Profile picture updated!', 'success');
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        function setPresetAvatar(index) {
            const user = getCurrentUser();
            if (!user) {
                showNotification('Please login first', 'error');
                return;
            }
            
            const colors = ['6366f1', 'ec4899', '10b981', 'f59e0b', 'ef4444', '06b6d4', '8b5cf6', '22c55e'];
            const icons = ['👤', '⭐', '🛒', '🎉', '❤️', '🚀', '🌟', '🌈'];
            const avatarUrl = `https://ui-avatars.com/api/?background=${colors[index-1]}&color=fff&bold=true&name=${icons[index-1]}`;
            
            document.getElementById('profileAvatar').src = avatarUrl;
            localStorage.setItem(`avatar_${user.id}`, avatarUrl);
            showNotification('Profile picture updated!', 'success');
        }

        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            showNotification('Logged out successfully!', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // Initialize page
        function initProfile() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileEmail').textContent = user.email;

            const savedAvatar = localStorage.getItem(`avatar_${user.id}`);
            if (savedAvatar) {
                document.getElementById('profileAvatar').src = savedAvatar;
            } else {
                document.getElementById('profileAvatar').src = `https://ui-avatars.com/api/?background=6366f1&color=fff&bold=true&name=${user.name.charAt(0)}`;
            }

            // Load order count
            fetch(`${API_URL}/orders`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            })
            .then(res => res.json())
            .then(orders => {
                document.getElementById('totalOrders').textContent = orders.length || 0;
            })
            .catch(() => {
                document.getElementById('totalOrders').textContent = '0';
            });

            updateWishlistCount();
            updateCartBadge();
            updateUserMenu();
        }

        // Initialize
        updateCartBadge();
        updateWishlistCount();
        loadTheme();
        initProfile();
    </script>
</body>
</html>
