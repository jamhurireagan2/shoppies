<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Shoppies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --card-bg: #ffffff;
            --navbar-bg: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-hover: 0 20px 30px rgba(0,0,0,0.1);
            --gradient-start: #6366f1;
            --gradient-end: #8b5cf6;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --card-bg: #1e293b;
            --navbar-bg: #0f172a;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .navbar {
            background: var(--navbar-bg);
            box-shadow: var(--shadow);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: var(--gradient-start);
        }
        .nav-links a.active {
            color: var(--gradient-start);
        }

        .orders-page {
            margin-top: 100px;
            margin-bottom: 60px;
        }
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .order-card {
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
        }
        .order-id {
            font-weight: 700;
            color: var(--text-primary);
        }
        .order-date {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-left: 1rem;
        }
        .order-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #dbeafe; color: #1e40af; }
        .status-shipped { background: #e0e7ff; color: #3730a3; }
        .status-delivered { background: #d1fae5; color: #065f46; }

        .order-items {
            padding: 1.5rem;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .order-item:last-child {
            border-bottom: none;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
        }
        .delivery-address {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .order-total {
            font-weight: 700;
            font-size: 1.125rem;
            color: var(--gradient-start);
        }

        .empty-orders {
            text-align: center;
            padding: 4rem;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }
        .empty-orders i {
            font-size: 4rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        .shop-btn {
            margin-top: 1.5rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            cursor: pointer;
        }

        .footer {
            background: var(--navbar-bg);
            color: var(--text-secondary);
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            border-top: 1px solid var(--border-color);
        }

        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 3000;
            transform: translateX(400px);
            transition: transform 0.3s;
            border-left: 4px solid #10b981;
        }
        .notification.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .order-header {
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }
            .order-footer {
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }
            .container {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-container">
                <div class="logo" onclick="window.location.href='index.html'">
                    <i class="fas fa-shopping-bag"></i>
                    <span>shoppies</span>
                </div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="products.html">Products</a>
                    <a href="cart.html">Cart</a>
                    <a href="orders.html" class="active">My Orders</a>
                </div>
                <div class="nav-actions">
                    <a href="cart.html" style="position: relative; color: var(--text-secondary);">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cartBadge" style="position: absolute; top: -8px; right: -12px; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%;">0</span>
                    </a>
                    <div id="userMenu"></div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container orders-page">
        <h1 class="page-title">My Orders</h1>
        <div id="ordersContainer"></div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Shoppies. All rights reserved. | <i class="fas fa-heart" style="color: #ec4899;"></i> Kenya's #1 Online Store</p>
        </div>
    </footer>

    <div id="notification" class="notification"></div>

    <script>
        const API_URL = 'https://shoppies-backend.onrender.com/api';

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.borderLeft = type === 'success' ? '4px solid #10b981' : '4px solid #ef4444';
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        function getCurrentUser() {
            const user = localStorage.getItem('user');
            return user ? JSON.parse(user) : null;
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.getElementById('cartBadge');
            if (badge) badge.textContent = count;
        }

        function updateUserMenu() {
            const user = getCurrentUser();
            const userMenu = document.getElementById('userMenu');
            if (userMenu) {
                if (user) {
                    userMenu.innerHTML = `
                        <div style="position: relative; display: inline-block;">
                            <button style="background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; border: none; padding: 0.5rem 1rem; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                                <i class="fas fa-user-circle"></i> ${user.name.split(' ')[0]}
                            </button>
                        </div>
                    `;
                } else {
                    userMenu.innerHTML = `<button onclick="window.location.href='index.html'" style="background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; border: none; padding: 0.5rem 1rem; border-radius: 50px; cursor: pointer;">Sign In</button>`;
                }
            }
        }

        async function loadOrders() {
            const container = document.getElementById('ordersContainer');
            const token = localStorage.getItem('token');
            
            if (!token) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <i class="fas fa-lock"></i>
                        <h2 style="color: var(--text-primary);">Please Login</h2>
                        <p style="color: var(--text-secondary);">Login to view your orders</p>
                        <button class="shop-btn" onclick="window.location.href='index.html'">Login Now</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-secondary);"><i class="fas fa-spinner fa-spin"></i> Loading orders...</div>';
            
            try {
                console.log('Fetching orders from:', API_URL);
                const response = await fetch(`${API_URL}/orders`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        container.innerHTML = `
                            <div class="empty-orders">
                                <i class="fas fa-lock"></i>
                                <h2 style="color: var(--text-primary);">Session Expired</h2>
                                <p style="color: var(--text-secondary);">Please login again</p>
                                <button class="shop-btn" onclick="window.location.href='index.html'">Login Now</button>
                            </div>
                        `;
                        return;
                    }
                    throw new Error('Failed to load orders');
                }
                
                const orders = await response.json();
                console.log('Orders loaded:', orders.length);
                
                if (!orders || orders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-orders">
                            <i class="fas fa-receipt"></i>
                            <h2 style="color: var(--text-primary);">No Orders Yet</h2>
                            <p style="color: var(--text-secondary);">Start shopping to see your orders here</p>
                            <button class="shop-btn" onclick="window.location.href='products.html'">Start Shopping</button>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">Order #${order.id || order._id?.slice(-8) || 'N/A'}</span>
                                <span class="order-date">${new Date(order.createdAt).toLocaleDateString()}</span>
                            </div>
                            <span class="order-status status-${order.orderStatus}">${order.orderStatus || 'pending'}</span>
                        </div>
                        <div class="order-items">
                            ${(order.products || []).map(item => `
                                <div class="order-item">
                                    <span>${item.name} x ${item.quantity}</span>
                                    <span>Ksh ${(item.price * item.quantity).toLocaleString()}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="order-footer">
                            <div class="delivery-address">
                                <i class="fas fa-map-marker-alt"></i> ${order.deliveryAddress || 'Nairobi, Kenya'}
                            </div>
                            <div class="order-total">Total: Ksh ${(order.totalAmount || 0).toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading orders:', error);
                container.innerHTML = `
                    <div class="empty-orders">
                        <i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i>
                        <h2 style="color: var(--text-primary);">Failed to Load Orders</h2>
                        <p style="color: var(--text-secondary);">Please make sure the backend is running</p>
                        <button class="shop-btn" onclick="location.reload()">Try Again</button>
                    </div>
                `;
            }
        }

        // Initialize
        updateCartBadge();
        updateUserMenu();
        loadOrders();
    </script>
</body>
</html>
